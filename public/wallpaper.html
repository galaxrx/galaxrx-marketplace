<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallpaper</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #020818;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Colour palette ──────────────────────────────────────────────
const BG_DARK   = '#020818';
const BLUE_DEEP = '#031240';
const BLUE_MID  = '#0a2a6e';
const BLUE_GLOW = '#1565c0';
const CYAN_HOT  = '#4fc3f7';
const WHITE_HOT = '#e8f4fd';

// ── Wave lines ──────────────────────────────────────────────────
const WAVE_SETS = [
  // { yBase, amplitude, freq, speed, lineCount, color, alpha, width }
  { yBase: 0.62, amplitude: 0.09, freq: 1.4, speed: 0.0000045, lineCount: 18, color: '#1a4a9e', alpha: 0.55, width: 0.7 },
  { yBase: 0.55, amplitude: 0.12, freq: 1.1, speed: 0.0000032, lineCount: 14, color: '#2060cc', alpha: 0.45, width: 0.6 },
  { yBase: 0.70, amplitude: 0.07, freq: 1.8, speed: 0.0000055, lineCount: 10, color: '#0d3b8c', alpha: 0.4,  width: 0.5 },
  { yBase: 0.45, amplitude: 0.15, freq: 0.9, speed: 0.0000025, lineCount: 8,  color: '#4fc3f7', alpha: 0.25, width: 0.4 },
  { yBase: 0.75, amplitude: 0.06, freq: 2.2, speed: 0.0000060, lineCount: 12, color: '#1a4a9e', alpha: 0.35, width: 0.5 },
];

// ── Particles ───────────────────────────────────────────────────
const PARTICLE_COUNT = 220;
let particles = [];

function makeParticle() {
  return {
    x: Math.random(),
    y: Math.random(),
    r: Math.random() * 1.8 + 0.3,
    vx: (Math.random() - 0.5) * 0.00012,
    vy: (Math.random() - 0.5) * 0.00010,
    alpha: Math.random() * 0.7 + 0.15,
    pulse: Math.random() * Math.PI * 2,
    pulseSpeed: Math.random() * 0.012 + 0.004,
    color: Math.random() < 0.6 ? CYAN_HOT : WHITE_HOT,
  };
}

for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(makeParticle());

// ── Lens flares ─────────────────────────────────────────────────
const FLARES = [
  { x: 0.38, y: 0.38, r: 90,  alpha: 0.55, pulse: 0,    speed: 0.0008 },
  { x: 0.62, y: 0.55, r: 60,  alpha: 0.35, pulse: 1.2,  speed: 0.0011 },
  { x: 0.20, y: 0.60, r: 45,  alpha: 0.30, pulse: 2.4,  speed: 0.0009 },
  { x: 0.75, y: 0.30, r: 35,  alpha: 0.25, pulse: 0.8,  speed: 0.0013 },
  { x: 0.50, y: 0.72, r: 28,  alpha: 0.20, pulse: 3.1,  speed: 0.0010 },
  { x: 0.85, y: 0.65, r: 22,  alpha: 0.18, pulse: 1.7,  speed: 0.0015 },
];

// ── Grid mesh ───────────────────────────────────────────────────
function drawGrid(t) {
  const W = canvas.width, H = canvas.height;
  const cellW = W / 28, cellH = H / 16;
  ctx.save();
  // Subtle perspective skew toward bottom-right
  ctx.transform(1, 0.08, -0.05, 1, W * 0.02, -H * 0.04);
  ctx.strokeStyle = 'rgba(30, 80, 180, 0.10)';
  ctx.lineWidth = 0.5;

  const offX = (t * 0.0012) % cellW;
  const offY = (t * 0.0008) % cellH;

  for (let x = -cellW + offX; x < W + cellW; x += cellW) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = -cellH + offY; y < H + cellH; y += cellH) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.restore();
}

// ── Background radial ────────────────────────────────────────────
function drawBackground() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = BG_DARK;
  ctx.fillRect(0, 0, W, H);

  // Deep central glow
  const gCenter = ctx.createRadialGradient(W*0.42, H*0.45, 0, W*0.42, H*0.45, W*0.6);
  gCenter.addColorStop(0,   'rgba(10, 42, 110, 0.70)');
  gCenter.addColorStop(0.4, 'rgba(3, 18, 64, 0.50)');
  gCenter.addColorStop(1,   'rgba(2, 8, 24, 0.0)');
  ctx.fillStyle = gCenter;
  ctx.fillRect(0, 0, W, H);

  // Bottom accent sweep
  const gBottom = ctx.createLinearGradient(0, H*0.6, 0, H);
  gBottom.addColorStop(0, 'rgba(8, 30, 90, 0.3)');
  gBottom.addColorStop(1, 'rgba(2, 8, 24, 0.0)');
  ctx.fillStyle = gBottom;
  ctx.fillRect(0, 0, W, H);
}

// ── Wave renderer ────────────────────────────────────────────────
function drawWaves(t) {
  const W = canvas.width, H = canvas.height;

  WAVE_SETS.forEach(ws => {
    const spacing = H * 0.012;
    for (let li = 0; li < ws.lineCount; li++) {
      const yOff = (li - ws.lineCount / 2) * spacing;
      ctx.beginPath();

      const STEPS = 200;
      for (let i = 0; i <= STEPS; i++) {
        const px = (i / STEPS) * W;
        const nx = i / STEPS;
        // Layered sine for organic feel
        const wave =
          Math.sin(nx * Math.PI * 2 * ws.freq + t * ws.speed * 100) * ws.amplitude * H +
          Math.sin(nx * Math.PI * 2 * ws.freq * 1.7 + t * ws.speed * 70 + li * 0.3) * ws.amplitude * H * 0.35 +
          Math.sin(nx * Math.PI * 2 * ws.freq * 0.5 + t * ws.speed * 50) * ws.amplitude * H * 0.2;
        const py = ws.yBase * H + yOff + wave;

        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }

      ctx.strokeStyle = ws.color;
      ctx.globalAlpha = ws.alpha * (0.6 + 0.4 * (li / ws.lineCount));
      ctx.lineWidth = ws.width;
      ctx.stroke();
    }
  });
  ctx.globalAlpha = 1;
}

// ── Lens flare renderer ──────────────────────────────────────────
function drawFlares(t) {
  const W = canvas.width, H = canvas.height;
  FLARES.forEach(f => {
    f.pulse += f.speed;
    const brightness = 0.7 + 0.3 * Math.sin(f.pulse);
    const r = f.r * (0.85 + 0.15 * Math.sin(f.pulse * 1.3));
    const cx = f.x * W, cy = f.y * H;

    // Outer glow
    const gOuter = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 3);
    gOuter.addColorStop(0,   `rgba(100, 200, 255, ${0.08 * brightness * f.alpha})`);
    gOuter.addColorStop(0.4, `rgba(30,  100, 220, ${0.12 * brightness * f.alpha})`);
    gOuter.addColorStop(1,   'rgba(0, 0, 0, 0)');
    ctx.fillStyle = gOuter;
    ctx.beginPath(); ctx.arc(cx, cy, r * 3, 0, Math.PI * 2); ctx.fill();

    // Inner bright core
    const gCore = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 0.8);
    gCore.addColorStop(0,   `rgba(220, 240, 255, ${0.9 * brightness * f.alpha})`);
    gCore.addColorStop(0.3, `rgba(100, 190, 255, ${0.6 * brightness * f.alpha})`);
    gCore.addColorStop(1,   'rgba(20, 80, 180, 0)');
    ctx.fillStyle = gCore;
    ctx.beginPath(); ctx.arc(cx, cy, r * 0.8, 0, Math.PI * 2); ctx.fill();

    // Streak rays
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(f.pulse * 0.05);
    const rayAlpha = 0.12 * brightness * f.alpha;
    [0, Math.PI/2, Math.PI/4, Math.PI*3/4].forEach(angle => {
      const len = r * 4;
      const gRay = ctx.createLinearGradient(0, 0, Math.cos(angle)*len, Math.sin(angle)*len);
      gRay.addColorStop(0,   `rgba(180, 225, 255, ${rayAlpha})`);
      gRay.addColorStop(1,   'rgba(180, 225, 255, 0)');
      ctx.strokeStyle = gRay;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-Math.cos(angle)*len, -Math.sin(angle)*len);
      ctx.lineTo( Math.cos(angle)*len,  Math.sin(angle)*len);
      ctx.stroke();
    });
    ctx.restore();
  });
}

// ── Particle renderer ────────────────────────────────────────────
function drawParticles(t) {
  const W = canvas.width, H = canvas.height;
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.pulse += p.pulseSpeed;
    if (p.x < 0) p.x = 1; if (p.x > 1) p.x = 0;
    if (p.y < 0) p.y = 1; if (p.y > 1) p.y = 0;

    const pulse = 0.5 + 0.5 * Math.sin(p.pulse);
    const alpha = p.alpha * (0.5 + 0.5 * pulse);
    const r = p.r * (0.8 + 0.2 * pulse);
    const cx = p.x * W, cy = p.y * H;

    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 3);
    g.addColorStop(0,   p.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba'));
    g.addColorStop(0.4, p.color.replace(')', `, ${alpha * 0.4})`).replace('rgb', 'rgba'));
    g.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, r * 3, 0, Math.PI * 2); ctx.fill();

    // Bright dot core
    ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.9})`;
    ctx.beginPath(); ctx.arc(cx, cy, r * 0.5, 0, Math.PI * 2); ctx.fill();
  });
}

// ── Bokeh circles ────────────────────────────────────────────────
const BOKEH = Array.from({length: 18}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random() * 40 + 15,
  alpha: Math.random() * 0.04 + 0.01,
  speed: (Math.random() - 0.5) * 0.000008,
}));

function drawBokeh() {
  const W = canvas.width, H = canvas.height;
  BOKEH.forEach(b => {
    b.x += b.speed; b.y += b.speed * 0.5;
    if (b.x > 1.1) b.x = -0.1; if (b.x < -0.1) b.x = 1.1;
    const g = ctx.createRadialGradient(b.x*W, b.y*H, 0, b.x*W, b.y*H, b.r);
    g.addColorStop(0,   `rgba(60, 130, 255, ${b.alpha * 2})`);
    g.addColorStop(0.5, `rgba(30,  80, 200, ${b.alpha})`);
    g.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(b.x*W, b.y*H, b.r, 0, Math.PI*2); ctx.fill();
  });
}

// ── Main loop ────────────────────────────────────────────────────
let t = 0;
function draw(ts) {
  t = ts;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawBackground();
  drawGrid(t);
  drawBokeh();
  drawWaves(t);
  drawFlares(t);
  drawParticles(t);

  // Vignette overlay
  const W = canvas.width, H = canvas.height;
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.2, W/2, H/2, H*0.85);
  vig.addColorStop(0,   'rgba(0,0,0,0)');
  vig.addColorStop(1,   'rgba(1, 5, 18, 0.72)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
